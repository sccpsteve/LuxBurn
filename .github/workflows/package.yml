name: Package LuxBurn

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-luxburn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Portable and installer packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build packages
        shell: cmd
        run: package.cmd

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: LuxBurn-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
