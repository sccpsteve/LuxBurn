name: Package LuxBurn

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-luxburn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Portable and installer packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build packages
        shell: cmd
        run: package.cmd

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: LuxBurn-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $title = "Latest LuxBurn Build"
          $installer = Get-ChildItem -LiteralPath dist -Filter "LuxBurn-v*-setup.exe" | Select-Object -First 1
          $portable = Get-ChildItem -LiteralPath dist -Filter "LuxBurn-v*-portable.zip" | Select-Object -First 1
          $manifest = Get-Item -LiteralPath "dist\LuxBurn-update.json"

          if ($null -eq $installer -or $null -eq $portable -or $null -eq $manifest) {
            throw "The expected LuxBurn release artifacts were not created."
          }

          $installerPath = $installer.FullName
          $portablePath = $portable.FullName
          $manifestPath = $manifest.FullName

          $notes = @"
          Automatic build from commit $env:GITHUB_SHA.

          Download $($installer.Name) for the installer.
          Download $($portable.Name) for the portable package.
          "@

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push --force origin "refs/tags/$tag"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
            gh release upload $tag $portablePath $installerPath $manifestPath --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $portablePath $installerPath $manifestPath --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
          }

      - name: Check public download links
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath "dist\LuxBurn-update.json" -Raw | ConvertFrom-Json
          $manifestUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/latest/LuxBurn-update.json"
          $urls = @($manifest.installerUrl, $manifest.portableUrl, $manifestUrl, $manifest.releasePageUrl)

          foreach ($url in $urls) {
            $ok = $false
            for ($try = 1; $try -le 24; $try++) {
              $separator = if ($url.Contains('?')) { "&" } else { "?" }
              $freshUrl = "$url${separator}luxburn_nocache=$([DateTime]::UtcNow.Ticks)-$try"
              & curl.exe --fail --location --silent --head -H "Cache-Control: no-cache, no-store, must-revalidate" -H "Pragma: no-cache" $freshUrl | Out-Null
              if ($LASTEXITCODE -eq 0) {
                $ok = $true
                break
              }
              Start-Sleep -Seconds 5
            }

            if (-not $ok) {
              Write-Warning "Download link did not become available yet: $url"
            }
          }
