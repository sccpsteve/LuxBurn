name: Package LuxBurn

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-luxburn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Portable and installer packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build packages
        shell: cmd
        run: package.cmd

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: LuxBurn-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $title = "Latest LuxBurn Build"
          $notes = @"
          Automatic build from commit $env:GITHUB_SHA.

          Download LuxBurn-v1.4-setup.exe for the installer.
          Download LuxBurn-v1.4-portable.zip for the portable package.
          "@

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push --force origin "refs/tags/$tag"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
            gh release upload $tag dist\LuxBurn-v1.4-portable.zip dist\LuxBurn-v1.4-setup.exe --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag dist\LuxBurn-v1.4-portable.zip dist\LuxBurn-v1.4-setup.exe --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
          }
